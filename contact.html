
<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Contact - SafeLinkPro</title>
  <link rel="stylesheet" href="styles.css">
</head>

<body>

<header>
  <h1>Contact Us</h1>
</header>

<main style="max-width:800px;margin:auto;padding:20px;line-height:1.6;">

  <h2>Get in Touch</h2>
  <p>
    If you have any questions, suggestions, or business inquiries, feel free to contact us.
    We will try to respond as soon as possible.
  </p>

  <h2>Email Support</h2>
  <p>
    📧 Email: <a href="mailto:riazart3@gmail.com">riazart3@gmail.com</a>
  </p>

  <h2>Contact Form</h2>

  <form onsubmit="sendMessage(event)">
    <input type="text" id="name" placeholder="Your Name" required style="width:100%;padding:10px;margin-bottom:10px;">
    
    <input type="email" id="email" placeholder="Your Email" required style="width:100%;padding:10px;margin-bottom:10px;">
    
    <textarea id="message" placeholder="Your Message" required style="width:100%;padding:10px;height:120px;margin-bottom:10px;"></textarea>
    
    <button type="submit" style="padding:10px 20px;">Send Message</button>
  </form>

  <p id="status" style="margin-top:10px;"></p>

</main>

<footer style="text-align:center;padding:20px;">
  <p>© 2026 SafeLinkPro</p>
  <p>
    <a href="index.html">Home</a> |
    <a href="about.html">About</a> |
    <a href="privacy.html">Privacy</a>
  </p>
</footer>

<script>
function sendMessage(e) {
  e.preventDefault();

  document.getElementById("status").innerText =
    "Message sent successfully (demo only).";

  e.target.reset();
}
</script>

</body>
</html>
